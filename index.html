<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hooke Plotter</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display:ital@0;1&display=swap');

:root {
  --bg: #fafaf8;
  --white: #ffffff;
  --border: #e8e6e1;
  --border-focus: #b5a898;
  --text: #2c2825;
  --muted: #9a9189;
  --soft: #f2f0ec;
  --accent: #f77e9d;
  --accent-dark: #d45f7f;
  --accent-bg: #fef0f4;
  --accent-border: rgba(247,126,157,0.35);
  --blue: #4a7fc1;
  --green: #4a9e6e;
  --red: #c14a4a;
  --orange: #e07b39;
  --shadow-sm: 0 1px 3px rgba(44,40,37,0.08), 0 4px 16px rgba(44,40,37,0.04);
  --shadow-md: 0 2px 8px rgba(44,40,37,0.1), 0 8px 24px rgba(44,40,37,0.06);
  --radius: 8px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ── Header ── */
header {
  background: var(--white);
  border-bottom: 1px solid var(--border);
  padding: 16px 28px;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
}
.logo {
  width: 30px; height: 30px;
  background: var(--accent);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; flex-shrink: 0;
}
header h1 {
  font-family: 'DM Serif Display', serif;
  font-size: 1.25rem; font-weight: 400;
}

/* ── Layout ── */
.app {
  display: grid;
  grid-template-columns: 300px 1fr;
  flex: 1;
  min-height: 0;
  height: calc(100vh - 63px);
}

/* ── Sidebar ── */
.sidebar {
  background: var(--white);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.panel {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.panel-title {
  font-size: 0.63rem;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 12px;
}

/* Fields */
.field { margin-bottom: 8px; }
.field:last-child { margin-bottom: 0; }
.field label {
  display: block;
  font-size: 0.72rem;
  font-weight: 500;
  color: var(--muted);
  margin-bottom: 3px;
}
.field input, .field select {
  width: 100%;
  background: var(--soft);
  border: 1.5px solid transparent;
  color: var(--text);
  padding: 7px 9px;
  border-radius: var(--radius);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.83rem;
  outline: none;
  transition: border-color 0.15s, background 0.15s, box-shadow 0.15s;
  appearance: none;
}
.field input::placeholder { color: #ccc; }
.field input:focus, .field select:focus {
  border-color: var(--border-focus);
  background: var(--white);
  box-shadow: 0 0 0 3px rgba(247,126,157,0.1);
}
/* Remove number spinners */
.field input[type=number]::-webkit-inner-spin-button,
.field input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
.field input[type=number] { -moz-appearance: textfield; }

.select-wrap { position: relative; }
.select-wrap::after {
  content: '▾'; position: absolute;
  right: 9px; top: 50%; transform: translateY(-50%);
  color: var(--muted); pointer-events: none; font-size: 10px;
}

/* Row of inputs */
.input-row { display: grid; gap: 6px; }

/* Toggle buttons */
.toggle-group { display: flex; flex-direction: column; gap: 5px; }
.toggle-wrap { display: contents; }
input.toggle-cb { display: none; }
.toggle-btn {
  display: flex; align-items: center; justify-content: center;
  padding: 7px 12px;
  border-radius: var(--radius);
  border: 1.5px solid var(--border);
  background: var(--soft);
  color: var(--muted);
  font-size: 0.78rem; font-weight: 500;
  cursor: pointer; transition: all 0.15s;
  user-select: none;
}
.toggle-btn:hover { border-color: var(--border-focus); color: var(--text); background: var(--white); }
input.toggle-cb:checked + .toggle-btn {
  background: var(--accent-bg);
  border-color: var(--accent);
  color: var(--accent);
  font-weight: 600;
}
input.toggle-cb:disabled + .toggle-btn {
  opacity: 0.35;
  pointer-events: none;
}

/* Global uncertainty sub-panel */
.unc-panel {
  display: none;
  flex-direction: column;
  gap: 5px;
  padding: 10px 10px;
  margin-top: 2px;
  background: var(--accent-bg);
  border: 1px solid var(--accent-border);
  border-radius: var(--radius);
}
.unc-panel.open { display: flex; }
.unc-row { display: grid; grid-template-columns: 22px 1fr; gap: 6px; align-items: center; }
.unc-axis {
  font-size: 0.7rem; font-weight: 700; color: var(--accent);
  text-align: center; background: white;
  border: 1px solid var(--accent-border);
  border-radius: 5px; padding: 2px 0; line-height: 1.8;
}
.unc-input {
  background: white;
  border: 1.5px solid transparent;
  color: var(--text); padding: 5px 8px;
  border-radius: 6px;
  font-family: 'DM Sans', sans-serif; font-size: 0.8rem;
  outline: none; width: 100%; transition: all 0.15s;
}
.unc-input:focus { border-color: var(--accent-border); box-shadow: 0 0 0 3px rgba(247,126,157,0.1); }
.unc-input::placeholder { color: #ccc; }

/* ── Data panel ── */
.data-panel {
  flex: 1; display: flex; flex-direction: column;
  overflow: hidden; padding: 16px 20px;
}

.data-header-row {
  display: grid; gap: 4px;
  margin-bottom: 5px; padding: 0 1px;
  flex-shrink: 0;
}
.data-header-row span {
  font-size: 0.65rem; font-weight: 600;
  color: var(--muted); text-align: center;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}

.data-rows {
  flex: 1; overflow-y: auto;
  display: flex; flex-direction: column;
  gap: 3px; padding-right: 2px;
}
.data-rows::-webkit-scrollbar { width: 3px; }
.data-rows::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.data-row { display: grid; gap: 4px; align-items: center; }

.row-num {
  font-size: 0.65rem; color: var(--muted);
  text-align: center; line-height: 1;
}

.data-row input[type=number] {
  background: var(--soft);
  border: 1.5px solid transparent;
  color: var(--text); padding: 6px 5px;
  border-radius: 6px;
  font-family: 'DM Sans', sans-serif; font-size: 0.8rem;
  outline: none; width: 100%; transition: all 0.15s;
  text-align: center;
  -moz-appearance: textfield;
}
.data-row input[type=number]::-webkit-inner-spin-button,
.data-row input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
.data-row input[type=number]::placeholder { color: #ccc; }
.data-row input[type=number]:focus {
  border-color: var(--border-focus); background: var(--white);
  box-shadow: 0 0 0 3px rgba(247,126,157,0.08);
}
.unc-cell { background: #fdf0f4 !important; }
.unc-cell:focus { border-color: rgba(247,126,157,0.4) !important; }

.data-row.anomalous input { opacity: 0.4; }
.data-row.anomalous .row-num { opacity: 0.4; }

.btn-icon {
  background: transparent; border: 1.5px solid var(--border);
  color: var(--muted);
  width: 22px; height: 22px;
  border-radius: 5px; cursor: pointer;
  font-size: 9px; display: flex;
  align-items: center; justify-content: center;
  transition: all 0.15s; padding: 0; flex-shrink: 0;
  line-height: 1;
}
.btn-icon:hover { border-color: var(--border-focus); color: var(--text); }
.btn-anom:hover { border-color: var(--accent); color: var(--accent); }
.btn-anom.on { border-color: var(--accent); color: var(--accent); background: var(--accent-bg); }
.btn-del:hover { border-color: var(--red); color: var(--red); background: #fdeaea; border-style: solid; }

.row-actions { display: flex; gap: 5px; margin-top: 10px; flex-wrap: wrap; flex-shrink: 0; }

/* Buttons */
.btn {
  padding: 6px 12px; border-radius: var(--radius);
  font-family: 'DM Sans', sans-serif; font-size: 0.78rem; font-weight: 500;
  cursor: pointer; border: 1.5px solid transparent;
  transition: all 0.15s; display: flex; align-items: center; gap: 4px;
  white-space: nowrap;
}
.btn-primary { background: var(--accent); color: white; border-color: var(--accent); }
.btn-primary:hover { background: var(--accent-dark); border-color: var(--accent-dark); }
.btn-ghost { background: transparent; color: var(--muted); border-color: var(--border); }
.btn-ghost:hover { border-color: var(--border-focus); color: var(--text); background: var(--soft); }

/* ── Chart area ── */
.chart-area {
  display: flex; flex-direction: column;
  padding: 20px 24px; gap: 12px;
  overflow: hidden; background: var(--bg);
}
.chart-top {
  display: flex; align-items: center;
  justify-content: space-between; gap: 10px; flex-wrap: wrap;
  flex-shrink: 0;
}
.stats-row { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }

.pill {
  background: var(--white); border: 1px solid var(--border);
  border-radius: 20px; padding: 4px 11px;
  display: flex; align-items: center; gap: 6px;
  box-shadow: var(--shadow-sm); flex-shrink: 0;
}
.pill-label {
  font-size: 0.63rem; font-weight: 600; color: var(--muted);
  text-transform: uppercase; letter-spacing: 0.07em;
}
.pill-value { font-size: 0.8rem; font-weight: 600; color: var(--text); }

.export-row { display: flex; gap: 6px; flex-shrink: 0; }

.chart-card {
  flex: 1; background: var(--white);
  border: 1px solid var(--border);
  border-radius: 14px; padding: 16px;
  box-shadow: var(--shadow-md);
  min-height: 0; position: relative;
  display: flex; align-items: center; justify-content: center;
}
.chart-card canvas { width: 100% !important; height: 100% !important; }

.empty-state {
  display: flex; flex-direction: column;
  align-items: center; gap: 8px;
  color: var(--muted); text-align: center;
}
.empty-icon {
  width: 52px; height: 52px; background: var(--soft);
  border-radius: 50%; display: flex; align-items: center;
  justify-content: center; font-size: 20px; margin-bottom: 4px;
}
.empty-state h3 {
  font-family: 'DM Serif Display', serif;
  font-size: 1rem; font-weight: 400; color: var(--text);
}
.empty-state p { font-size: 0.76rem; max-width: 190px; line-height: 1.5; }

/* ── Modal ── */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(44,40,37,0.4); backdrop-filter: blur(3px);
  z-index: 100; align-items: center; justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--white); border: 1px solid var(--border);
  border-radius: 14px; padding: 24px;
  width: 380px; max-width: 92vw;
  box-shadow: var(--shadow-md);
}
.modal h3 {
  font-family: 'DM Serif Display', serif;
  font-size: 1.15rem; font-weight: 400; margin-bottom: 6px;
}
.modal p { font-size: 0.76rem; color: var(--muted); margin-bottom: 12px; line-height: 1.6; }
.modal textarea {
  width: 100%; height: 140px;
  background: var(--soft); border: 1.5px solid transparent;
  color: var(--text); padding: 9px; border-radius: var(--radius);
  font-family: 'DM Sans', sans-serif; font-size: 0.8rem;
  outline: none; resize: vertical; margin-bottom: 12px; transition: all 0.15s;
}
.modal textarea:focus { border-color: var(--border-focus); background: white; }
.modal-footer { display: flex; gap: 6px; justify-content: flex-end; }
</style>
</head>
<body>

<header>
  <div class="logo">📈</div>
  <h1>Hooke Plotter</h1>
</header>

<div class="app">

  <!-- ── SIDEBAR ── -->
  <div class="sidebar">
    <div class="panel">
      <div class="panel-title">Labels</div>

      <div class="field">
        <label>Graph title</label>
        <input type="text" id="graphTitle" placeholder="e.g. Force vs. Extension" oninput="updateChart()">
      </div>

      <!-- X axis -->
      <div class="input-row" style="grid-template-columns:1fr 44px 64px; margin-bottom:8px;">
        <div class="field" style="margin:0">
          <label>X label</label>
          <input type="text" id="xLabel" placeholder="e.g. Time^2" oninput="updateChart()">
        </div>
        <div class="field" style="margin:0">
          <label style="text-align:center;">×10<sup style="font-size:.6em">n</sup></label>
          <input type="number" id="xExp" placeholder="9" step="1" style="text-align:center;" oninput="updateChart()">
        </div>
        <div class="field" style="margin:0">
          <label>Units</label>
          <input type="text" id="xUnits" placeholder="e.g. s^2" oninput="updateChart()">
        </div>
      </div>

      <!-- Y axis -->
      <div class="input-row" style="grid-template-columns:1fr 44px 64px; margin-bottom:10px;">
        <div class="field" style="margin:0">
          <label>Y label</label>
          <input type="text" id="yLabel" placeholder="e.g. Force" oninput="updateChart()">
        </div>
        <div class="field" style="margin:0">
          <label style="text-align:center;">×10<sup style="font-size:.6em">n</sup></label>
          <input type="number" id="yExp" placeholder="-3" step="1" style="text-align:center;" oninput="updateChart()">
        </div>
        <div class="field" style="margin:0">
          <label>Units</label>
          <input type="text" id="yUnits" placeholder="e.g. N" oninput="updateChart()">
        </div>
      </div>

      <!-- Trend line -->
      <div class="field">
        <label>Trend line</label>
        <div class="select-wrap">
          <select id="trendType" onchange="updateChart()">
            <option value="none">No trend line</option>
            <option value="linear" selected>Linear</option>
            <option value="poly2">x²</option>
            <option value="reciprocal">1/x</option>
            <option value="exponential">Exponential</option>
            <option value="power">Power law</option>
            <option value="logarithmic">Logarithmic</option>
          </select>
        </div>
      </div>

      <!-- Toggles -->
      <div class="toggle-group">
        <input class="toggle-cb" type="checkbox" id="cbErrors" onchange="onToggleErrors()">
        <label class="toggle-btn" for="cbErrors">± Uncertainty columns</label>

        <div class="unc-panel" id="uncPanel">
          <div class="unc-row">
            <span class="unc-axis">X</span>
            <input class="unc-input" id="xUncInput" type="text" placeholder="e.g. 0.5 or 2%" oninput="applyGlobalUnc()">
          </div>
          <div class="unc-row">
            <span class="unc-axis">Y</span>
            <input class="unc-input" id="yUncInput" type="text" placeholder="e.g. 0.5 or 2%" oninput="applyGlobalUnc()">
          </div>
        </div>

        <input class="toggle-cb" type="checkbox" id="cbExtrapolate" onchange="updateChart()">
        <label class="toggle-btn" id="lblExtrapolate" for="cbExtrapolate">Extrapolate to y-intercept</label>

        <input class="toggle-cb" type="checkbox" id="cbMaxGrad" onchange="updateChart()">
        <label class="toggle-btn" id="lblMaxGrad" for="cbMaxGrad">Max gradient line</label>
      </div>
    </div>

    <!-- Data table -->
    <div class="data-panel">
      <div class="panel-title">Data Points</div>
      <div class="data-header-row" id="hdrRow">
        <span id="hdrX">X</span>
        <span id="hdrDX" style="display:none">±X</span>
        <span id="hdrY">Y</span>
        <span id="hdrDY" style="display:none">±Y</span>
        <span>⚬</span>
      </div>
      <div class="data-rows" id="dataRows"></div>
      <div class="row-actions">
        <button class="btn btn-primary" onclick="addRow()">+ Add row</button>
        <button class="btn btn-ghost" onclick="openPaste()">Paste data</button>
        <button class="btn btn-ghost" onclick="clearAll()">Clear all</button>
      </div>
    </div>
  </div>

  <!-- ── CHART AREA ── -->
  <div class="chart-area" id="chartArea">
    <div class="export-row">
      <button class="btn btn-ghost" onclick="exportImage()">↓ Export image</button>
      <button class="btn btn-ghost" onclick="saveData()">↓ Save data</button>
      <button class="btn btn-ghost" onclick="document.getElementById('fileInput').click()">↑ Load data</button>
      <input type="file" id="fileInput" accept=".json" style="display:none" onchange="loadData(event)">
    </div>
    <div class="stats-row" id="statsRow">
      <div class="pill">
        <span class="pill-label">Points</span>
        <span class="pill-value" id="statN">0</span>
      </div>
      <div class="pill">
        <span class="pill-label">Equation</span>
        <span class="pill-value" id="statEq" style="color:var(--accent)">—</span>
      </div>

      <div class="pill" id="pillGrad" style="display:none">
        <span class="pill-label">Gradient</span>
        <span class="pill-value" id="statGrad" style="color:var(--blue)">—</span>
      </div>
      <div class="pill" id="pillIntercept" style="display:none">
        <span class="pill-label">y-intercept</span>
        <span class="pill-value" id="statIntercept" style="color:var(--blue)">—</span>
      </div>
      <div class="pill" id="pillMaxGrad" style="display:none">
        <span class="pill-label">Max gradient</span>
        <span class="pill-value" id="statMaxGrad" style="color:var(--orange)">—</span>
      </div>
    </div>

    <div class="chart-card" id="chartCard">
      <div class="empty-state" id="emptyState">
        <div class="empty-icon">✦</div>
        <h3>No data yet</h3>
        <p>Add data points on the left and your graph will appear here.</p>
      </div>
      <canvas id="myChart" style="display:none"></canvas>
    </div>
  </div>
</div>

<!-- Paste modal -->
<div class="modal-overlay" id="pasteModal">
  <div class="modal">
    <h3>Paste Data</h3>
    <p>Paste two columns of numbers — one row per line, separated by tab, comma or space.</p>
    <textarea id="pasteArea" placeholder="1.0   2.3&#10;2.0   4.1&#10;3.0   6.8"></textarea>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closePaste()">Cancel</button>
      <button class="btn btn-primary" onclick="importPaste()">Import</button>
    </div>
  </div>
</div>

<script>
// ── State ──────────────────────────────────────────────────────────────
let chart = null;
let rows  = [];

// ── Helpers ────────────────────────────────────────────────────────────
function sup(str) {
  // Convert ^N or ^-N to <sup>N</sup> (used for units, labels, title)
  return str.replace(/\^(-?\d+)/g, '<sup>$1</sup>');
}

function fmt(v) {
  if (v === 0) return '0';
  if (Math.abs(v) >= 1e4 || Math.abs(v) < 0.001) {
    const e = Math.floor(Math.log10(Math.abs(v)));
    const m = parseFloat((v / Math.pow(10, e)).toFixed(2));
    return `${m} \u00d710<sup>${e}</sup>`;
  }
  return parseFloat(v.toFixed(4)).toString();
}

function linspace(a, b, n) {
  return Array.from({length: n}, (_, i) => a + (b - a) * i / (n - 1));
}

function errorsOn() { return document.getElementById('cbErrors').checked; }

function getExp(id) {
  const v = parseInt(document.getElementById(id).value, 10);
  return (isNaN(v) || v === 0) ? null : v;
}

// ── Axis label builder ─────────────────────────────────────────────────
// Applies sup() to label and units, builds "Label / 10^n Units" HTML
function buildAxisHTML(label, exp, units) {
  const L = sup(label || '');
  const U = units ? sup(units) : '';
  const E = exp !== null ? `10<sup>${exp}</sup>` : null;
  if (E && U)  return `${L} / ${E}\u00a0${U}`;
  if (E)       return `${L} / ${E}`;
  if (U)       return `${L} / ${U}`;
  return L;
}

function stripHTML(s) { return s.replace(/<[^>]+>/g, ''); }

// ── Row management ─────────────────────────────────────────────────────
function makeRow(x='', y='', dx='', dy='', anomalous=false) {
  return { id: Date.now() + Math.random(), x, y, dx, dy,
           dxAuto: false, dyAuto: false, anomalous };
}

function addRow(x='', y='', dx='', dy='', anomalous=false) {
  rows.push(makeRow(x, y, dx, dy, anomalous));
  renderRows();
  if (errorsOn()) applyGlobalUnc(); else updateChart();
}

function removeRow(id) {
  rows = rows.filter(r => r.id !== id);
  renderRows(); updateChart();
}

function clearAll() { rows = []; renderRows(); updateChart(); }

// ── Render rows ────────────────────────────────────────────────────────
function renderRows() {
  const container = document.getElementById('dataRows');
  const showErr = errorsOn();
  // column layout: # | x | [±x] | y | [±y] | anom | del
  const cols = showErr
    ? '1fr 0.65fr 1fr 0.65fr 22px'
    : '1fr 1fr 22px';
  const hdrCols = cols;

  // Update header
  document.getElementById('hdrRow').style.gridTemplateColumns = hdrCols;
  document.getElementById('hdrDX').style.display = showErr ? '' : 'none';
  document.getElementById('hdrDY').style.display = showErr ? '' : 'none';

  // Remove excess DOM rows
  const existing = Array.from(container.querySelectorAll('.data-row'));
  while (existing.length > rows.length) container.removeChild(existing.pop());

  rows.forEach((row, i) => {
    let div = existing[i];
    if (!div) {
      // Create new row
      div = document.createElement('div');
      div.className = 'data-row';

      // x, dx, y, dy inputs
      ['x', 'dx', 'y', 'dy'].forEach(field => {
        const inp = document.createElement('input');
        inp.type = 'number';
        inp.step = 'any';
        inp.placeholder = (field === 'dx' || field === 'dy') ? '±' : '—';
        inp.dataset.field = field;
        if (field === 'dx' || field === 'dy') inp.classList.add('unc-cell');
        inp.addEventListener('input', () => {
          const r = rows.find(r => r.id === +div.dataset.rowId);
          if (!r) return;
          r[field] = inp.value;
          if (field === 'dx') r.dxAuto = false;
          if (field === 'dy') r.dyAuto = false;
          if ((field === 'x' || field === 'y') && errorsOn()) applyGlobalUnc();
          else updateChart();
        });
        div.appendChild(inp);
      });

      // Anomalous button
      const btnA = document.createElement('button');
      btnA.className = 'btn-icon btn-anom';
      btnA.title = 'Mark anomalous';
      btnA.textContent = '○';
      btnA.addEventListener('click', () => {
        const r = rows.find(r => r.id === +div.dataset.rowId);
        if (!r) return;
        r.anomalous = !r.anomalous;
        // Read current state fresh rather than using stale closure values
        const currentShowErr = errorsOn();
        const currentCols = currentShowErr
          ? '1fr 0.65fr 1fr 0.65fr 22px'
          : '1fr 1fr 22px';
        updateDiv(div, r, currentShowErr, currentCols);
        updateChart();
      });
      div.appendChild(btnA);



      container.appendChild(div);
    }

    div.dataset.rowId = row.id;
    updateDiv(div, row, showErr, cols);
  });
}

function updateDiv(div, row, showErr, cols) {
  div.style.gridTemplateColumns = cols;
  div.classList.toggle('anomalous', !!row.anomalous);

  div.querySelector('.btn-anom').classList.toggle('on', !!row.anomalous);

  div.querySelectorAll('input[data-field]').forEach(inp => {
    const field = inp.dataset.field;
    const isErr = field === 'dx' || field === 'dy';
    inp.style.display = (isErr && !showErr) ? 'none' : '';
    if (document.activeElement !== inp) {
      inp.value = (row[field] !== undefined && row[field] !== '') ? row[field] : '';
    }
  });
}

// ── Uncertainty panel ──────────────────────────────────────────────────
function onToggleErrors() {
  const on = errorsOn();
  document.getElementById('uncPanel').classList.toggle('open', on);
  renderRows();
  if (on) applyGlobalUnc(); else updateChart();
}

function parseUnc(str) {
  if (!str) return null;
  const s = str.trim();
  if (s.endsWith('%')) {
    const v = parseFloat(s);
    return (!isNaN(v) && v > 0) ? {pct: true, v} : null;
  }
  const v = parseFloat(s);
  return (!isNaN(v) && v > 0) ? {pct: false, v} : null;
}

function applyGlobalUnc() {
  const xu = parseUnc(document.getElementById('xUncInput').value);
  const yu = parseUnc(document.getElementById('yUncInput').value);
  rows.forEach(r => {
    if (xu && (r.dx === '' || r.dxAuto)) {
      const xv = parseFloat(r.x);
      if (!isNaN(xv)) {
        r.dx = xu.pct
          ? parseFloat((Math.abs(xv) * xu.v / 100).toPrecision(3)).toString()
          : xu.v.toString();
        r.dxAuto = true;
      }
    } else if (!xu && r.dxAuto) { r.dx = ''; r.dxAuto = false; }

    if (yu && (r.dy === '' || r.dyAuto)) {
      const yv = parseFloat(r.y);
      if (!isNaN(yv)) {
        r.dy = yu.pct
          ? parseFloat((Math.abs(yv) * yu.v / 100).toPrecision(3)).toString()
          : yu.v.toString();
        r.dyAuto = true;
      }
    } else if (!yu && r.dyAuto) { r.dy = ''; r.dyAuto = false; }
  });
  renderRows();
  updateChart();
}

function openPaste()  { document.getElementById('pasteModal').classList.add('open'); }
function closePaste() { document.getElementById('pasteModal').classList.remove('open'); }

document.getElementById('pasteModal').addEventListener('click', e => {
  if (e.target === e.currentTarget) closePaste();
});

function importPaste() {
  const raw = document.getElementById('pasteArea').value.trim();
  const newRows = [];
  raw.split('\n').filter(l => l.trim()).forEach(line => {
    const parts = line.trim().split(/[\t,;\s]+/);
    if (parts.length >= 2) {
      const x = parseFloat(parts[0]), y = parseFloat(parts[1]);
      if (!isNaN(x) && !isNaN(y)) newRows.push(makeRow(x, y));
    }
  });
  if (!newRows.length) { alert('Could not read any data — please check the format.'); return; }
  rows = newRows;
  renderRows();
  if (errorsOn()) applyGlobalUnc(); else updateChart();
  document.getElementById('pasteArea').value = '';
  closePaste();
}

// ── Maths ──────────────────────────────────────────────────────────────
function polyFit(xs, ys, deg) {
  const n = xs.length, m = deg + 1;
  const A = xs.map(x => Array.from({length: m}, (_, j) => Math.pow(x, j)));
  const AtA = Array.from({length: m}, (_, i) =>
    Array.from({length: m}, (_, j) => A.reduce((s, r) => s + r[i] * r[j], 0)));
  const Aty = Array.from({length: m}, (_, i) => A.reduce((s, r, k) => s + r[i] * ys[k], 0));
  return gaussElim(AtA, Aty);
}

function gaussElim(A, b) {
  const n = b.length;
  const M = A.map((r, i) => [...r, b[i]]);
  for (let c = 0; c < n; c++) {
    let mx = c;
    for (let r = c + 1; r < n; r++) if (Math.abs(M[r][c]) > Math.abs(M[mx][c])) mx = r;
    [M[c], M[mx]] = [M[mx], M[c]];
    for (let r = c + 1; r < n; r++) {
      const f = M[r][c] / M[c][c];
      for (let j = c; j <= n; j++) M[r][j] -= f * M[c][j];
    }
  }
  const x = new Array(n).fill(0);
  for (let i = n - 1; i >= 0; i--) {
    x[i] = M[i][n];
    for (let j = i + 1; j < n; j++) x[i] -= M[i][j] * x[j];
    x[i] /= M[i][i];
  }
  return x;
}

function rSq(xs, ys, fn) {
  const mean = ys.reduce((a, b) => a + b, 0) / ys.length;
  const tot  = ys.reduce((s, y) => s + (y - mean) ** 2, 0);
  const res  = xs.reduce((s, x, i) => s + (ys[i] - fn(x)) ** 2, 0);
  return 1 - res / tot;
}

function computeTrend(xs, ys, type) {
  const xMin = Math.min(...xs), xMax = Math.max(...xs);
  const pts = linspace(xMin, xMax, 200);
  const pm = (v) => v >= 0 ? '+' : '\u2212';

  if (type === 'linear') {
    const [c, m] = polyFit(xs, ys, 1);
    const fn = x => m * x + c;
    return { pts: pts.map(x => ({x, y: fn(x)})),
      eq: `y = ${fmt(m)}x ${pm(c)} ${fmt(Math.abs(c))}`,
      r2: rSq(xs, ys, fn), slope: m, intercept: c };
  }
  if (type === 'poly2') {
    const co = polyFit(xs, ys, 2);
    const fn = x => co.reduce((s, c, i) => s + c * x ** i, 0);
    return { pts: pts.map(x => ({x, y: fn(x)})),
      eq: `y = ${fmt(co[2])}x\u00b2 ${pm(co[1])} ${fmt(Math.abs(co[1]))}x ${pm(co[0])} ${fmt(Math.abs(co[0]))}`,
      r2: rSq(xs, ys, fn) };
  }
  if (type === 'reciprocal') {
    if (xs.some(x => x === 0)) return {pts:[], eq:'X values cannot be zero', r2:null};
    const [c, a] = polyFit(xs.map(x => 1/x), ys, 1);
    const fn = x => a / x + c;
    return { pts: pts.filter(x => x !== 0).map(x => ({x, y: fn(x)})),
      eq: `y = ${fmt(a)}/x ${pm(c)} ${fmt(Math.abs(c))}`,
      r2: rSq(xs, ys, fn) };
  }
  if (type === 'exponential') {
    if (!ys.every(y => y > 0)) return {pts:[], eq:'Needs positive Y values', r2:null};
    const [lnA, b] = polyFit(xs, ys.map(Math.log), 1);
    const a = Math.exp(lnA);
    const fn = x => a * Math.exp(b * x);
    return { pts: pts.map(x => ({x, y: fn(x)})),
      eq: `y = ${fmt(a)}\u00b7e^(${fmt(b)}x)`,
      r2: rSq(xs, ys, fn) };
  }
  if (type === 'power') {
    if (!xs.every(x => x > 0) || !ys.every(y => y > 0))
      return {pts:[], eq:'Needs positive X & Y', r2:null};
    const [lnA, b] = polyFit(xs.map(Math.log), ys.map(Math.log), 1);
    const a = Math.exp(lnA);
    const fn = x => a * x ** b;
    return { pts: pts.filter(x => x > 0).map(x => ({x, y: fn(x)})),
      eq: `y = ${fmt(a)}\u00b7x^${fmt(b)}`,
      r2: rSq(xs, ys, fn) };
  }
  if (type === 'logarithmic') {
    if (!xs.every(x => x > 0)) return {pts:[], eq:'Needs positive X values', r2:null};
    const [c, a] = polyFit(xs.map(Math.log), ys, 1);
    const fn = x => a * Math.log(x) + c;
    return { pts: pts.filter(x => x > 0).map(x => ({x, y: fn(x)})),
      eq: `y = ${fmt(a)}\u00b7ln(x) ${pm(c)} ${fmt(Math.abs(c))}`,
      r2: rSq(xs, ys, fn) };
  }
  return null;
}

// ── Update chart ───────────────────────────────────────────────────────
function updateChart() {
  const trend = document.getElementById('trendType').value;
  const xExpVal = getExp('xExp');
  const yExpVal = getExp('yExp');
  const xMult = xExpVal !== null ? Math.pow(10, xExpVal) : 1;
  const yMult = yExpVal !== null ? Math.pow(10, yExpVal) : 1;

  // Axis label HTML (for custom canvas drawing)
  const xLabelHTML = buildAxisHTML(
    document.getElementById('xLabel').value || 'X',
    xExpVal,
    document.getElementById('xUnits').value.trim()
  );
  const yLabelHTML = buildAxisHTML(
    document.getElementById('yLabel').value || 'Y',
    yExpVal,
    document.getElementById('yUnits').value.trim()
  );

  // Title HTML
  const titleRaw = document.getElementById('graphTitle').value || '';
  const titleHTML = sup(titleRaw);

  // Update table headers
  document.getElementById('hdrX').innerHTML = xLabelHTML;
  document.getElementById('hdrY').innerHTML = yLabelHTML;
  document.getElementById('hdrDX').innerHTML = '\u00b1' + stripHTML(xLabelHTML);
  document.getElementById('hdrDY').innerHTML = '\u00b1' + stripHTML(yLabelHTML);

  // Extrapolate toggle — only enabled for linear
  const isLinear = trend === 'linear';
  const cbExtra = document.getElementById('cbExtrapolate');
  const cbMaxG  = document.getElementById('cbMaxGrad');
  document.getElementById('lblExtrapolate').style.opacity = isLinear ? '1' : '0.35';
  document.getElementById('lblExtrapolate').style.pointerEvents = isLinear ? '' : 'none';
  if (!isLinear) cbExtra.checked = false;

  // Split rows into normal and anomalous
  const valid   = rows.filter(r => r.x !== '' && r.y !== '' && !isNaN(+r.x) && !isNaN(+r.y));
  const normal  = valid.filter(r => !r.anomalous);
  const anomaly = valid.filter(r =>  r.anomalous);

  const normalPts  = normal.map(r => ({x: +r.x, y: +r.y}));
  const anomalyPts = anomaly.map(r => ({x: +r.x, y: +r.y}));
  const errBars    = normal.map(r => ({
    x: +r.x, y: +r.y,
    dx: (r.dx !== '' && !isNaN(+r.dx)) ? Math.abs(+r.dx) : null,
    dy: (r.dy !== '' && !isNaN(+r.dy)) ? Math.abs(+r.dy) : null,
  }));

  const hasAny  = valid.length >= 1;
  const hasFit  = normalPts.length >= 2;

  document.getElementById('emptyState').style.display = hasAny ? 'none' : 'flex';
  document.getElementById('myChart').style.display    = hasAny ? 'block' : 'none';
  document.getElementById('statN').textContent =
    normalPts.length + (anomalyPts.length ? ` (${anomalyPts.length} excl.)` : '');

  // Trend line
  let trendPts = null, extraPts = null, eq = '—', r2txt = '—';
  let slope = null, intercept = null;

  if (hasFit && trend !== 'none') {
    const xs = normalPts.map(p => p.x);
    const ys = normalPts.map(p => p.y);
    const res = computeTrend(xs, ys, trend);
    if (res) {
      trendPts = res.pts; eq = res.eq;
      r2txt = res.r2 !== null ? res.r2.toFixed(4) : '—';
      if (isLinear) { slope = res.slope; intercept = res.intercept; }
    }
    if (isLinear && cbExtra.checked && slope !== null && Math.min(...xs) > 0) {
      const xMin0 = Math.min(...xs);
      extraPts = linspace(0, xMin0, 60).map(x => ({x, y: slope * x + intercept}));
    }
  }

  document.getElementById('statEq').innerHTML = eq;

  // Gradient / intercept pills
  const showLinear = isLinear && slope !== null;
  document.getElementById('pillGrad').style.display     = showLinear ? '' : 'none';
  document.getElementById('pillIntercept').style.display = showLinear ? '' : 'none';
  if (showLinear) {
    document.getElementById('statGrad').innerHTML      = fmt(slope * yMult / xMult);
    document.getElementById('statIntercept').innerHTML = fmt(intercept * yMult);
  }

  // Max gradient
  const canMaxGrad = hasFit && isLinear && errorsOn() && errBars.some(e => e.dx || e.dy);
  document.getElementById('lblMaxGrad').style.opacity      = canMaxGrad ? '1' : '0.35';
  document.getElementById('lblMaxGrad').style.pointerEvents = canMaxGrad ? '' : 'none';
  if (!canMaxGrad) cbMaxG.checked = false;

  let maxGradPts = null, maxGradVal = null;
  if (canMaxGrad && cbMaxG.checked && errBars.length >= 2 && slope !== null) {
    function feasible(m) {
      let lo = -Infinity, hi = Infinity;
      for (const eb of errBars) {
        const dx = eb.dx ?? 0, dy = eb.dy ?? 0;
        const cHi = (eb.y + dy) - m * (eb.x - Math.sign(m) * dx);
        const cLo = (eb.y - dy) - m * (eb.x + Math.sign(m) * dx);
        if (cLo > hi || cHi < lo) return {ok: false};
        lo = Math.max(lo, cLo); hi = Math.min(hi, cHi);
      }
      return {ok: lo <= hi, c: (lo + hi) / 2};
    }
    let mHi = -Infinity;
    for (const a of errBars) for (const b of errBars) {
      const dxa=a.dx??0, dya=a.dy??0, dxb=b.dx??0, dyb=b.dy??0;
      for (const sa of [-1,1]) for (const sb of [-1,1]) for (const sy of [-1,1]) {
        const ax=a.x+sa*dxa, ay=a.y+sy*dya, bx=b.x+sb*dxb, by=b.y+sy*dyb;
        if (bx !== ax) mHi = Math.max(mHi, (by - ay) / (bx - ax));
      }
    }
    let mLo = slope;
    for (let i = 0; i < 80; i++) {
      const mid = (mLo + mHi) / 2;
      if (feasible(mid).ok) mLo = mid; else mHi = mid;
    }
    const res2 = feasible(mLo);
    if (res2.ok) {
      maxGradVal = mLo;
      const xs = normalPts.map(p => p.x);
      maxGradPts = linspace(Math.min(...xs), Math.max(...xs), 100)
        .map(x => ({x, y: maxGradVal * x + res2.c}));
    }
  }
  document.getElementById('pillMaxGrad').style.display = maxGradVal !== null ? '' : 'none';
  if (maxGradVal !== null)
    document.getElementById('statMaxGrad').innerHTML = fmt(maxGradVal * yMult / xMult);

  // ── Build datasets ──────────────────────────────────────────────────
  const datasets = [{
    label: 'Data', data: normalPts, type: 'scatter', order: 2,
    backgroundColor: '#f77e9d', pointRadius: 4, pointHoverRadius: 6,
    pointBorderColor: 'white', pointBorderWidth: 1.5,
  }];
  if (anomalyPts.length) datasets.push({
    label: 'Anomalous', data: anomalyPts, type: 'scatter', order: 2,
    backgroundColor: '#f77e9d', pointRadius: 4, pointHoverRadius: 6,
    pointBorderColor: 'white', pointBorderWidth: 1.5,
  });
  if (trendPts?.length) datasets.push({
    label: 'Trend', data: trendPts, type: 'line', order: 1,
    borderColor: '#4a7fc1', borderWidth: 2.5, pointRadius: 0, tension: 0.3,
  });
  if (extraPts?.length) datasets.push({
    label: 'Extrapolated', data: extraPts, type: 'line', order: 1,
    borderColor: '#4a7fc1', borderWidth: 2, borderDash: [6,4], pointRadius: 0, tension: 0.3,
  });
  if (maxGradPts?.length) datasets.push({
    label: 'Max gradient', data: maxGradPts, type: 'line', order: 1,
    borderColor: 'rgba(224,123,57,0.85)', borderWidth: 2, borderDash: [5,3], pointRadius: 0,
  });

  // ── White background plugin (ensures PNG export has white bg, not transparent) ──
  const whiteBgPlugin = {
    id: 'whiteBg',
    beforeDraw(chart) {
      const ctx = chart.ctx;
      ctx.save();
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, chart.width, chart.height);
      ctx.restore();
    }
  };

  // ── Error bar plugin ────────────────────────────────────────────────
  const errorBarPlugin = {
    id: 'errorBars',
    afterDatasetsDraw(chart) {
      if (!errorsOn()) return;
      const ctx = chart.ctx;
      const xS = chart.scales.x, yS = chart.scales.y;
      ctx.save();
      ctx.strokeStyle = 'rgba(247,126,157,0.55)';
      ctx.lineWidth = 1.8;
      const cap = 5;
      errBars.forEach(pt => {
        const px = xS.getPixelForValue(pt.x);
        const py = yS.getPixelForValue(pt.y);
        if (pt.dy) {
          const top = yS.getPixelForValue(pt.y + pt.dy);
          const bot = yS.getPixelForValue(pt.y - pt.dy);
          ctx.beginPath();
          ctx.moveTo(px, top); ctx.lineTo(px, bot);
          ctx.moveTo(px-cap, top); ctx.lineTo(px+cap, top);
          ctx.moveTo(px-cap, bot); ctx.lineTo(px+cap, bot);
          ctx.stroke();
        }
        if (pt.dx) {
          const lft = xS.getPixelForValue(pt.x - pt.dx);
          const rgt = xS.getPixelForValue(pt.x + pt.dx);
          ctx.beginPath();
          ctx.moveTo(lft, py); ctx.lineTo(rgt, py);
          ctx.moveTo(lft, py-cap); ctx.lineTo(lft, py+cap);
          ctx.moveTo(rgt, py-cap); ctx.lineTo(rgt, py+cap);
          ctx.stroke();
        }
      });
      ctx.restore();
    }
  };

  // ── Custom axis title plugin (supports superscripts) ───────────────
  const axisTitlePlugin = {
    id: 'axisTitles',
    afterDraw(chart) {
      const ctx = chart.ctx;
      const {top, bottom, left, right} = chart.chartArea;

      function drawSegments(html, cx, cy, angle, baseSize, color, fontFamily) {
        fontFamily = fontFamily || "'DM Sans',sans-serif";
        ctx.save();
        ctx.translate(cx, cy);
        if (angle) ctx.rotate(angle);
        ctx.textBaseline = 'alphabetic';
        ctx.textAlign = 'left';
        const SUP = Math.round(baseSize * 0.64);
        const supFamily = "'DM Sans',sans-serif"; // superscripts always DM Sans
        const segs = [];
        const re = /<sup>([^<]*)<\/sup>|([^<]+)/g;
        let m;
        while ((m = re.exec(html)) !== null)
          segs.push(m[1] !== undefined ? {t: m[1], sup: true} : {t: m[2], sup: false});
        let total = 0;
        segs.forEach(s => {
          ctx.font = `400 ${s.sup ? SUP : baseSize}px ${s.sup ? supFamily : fontFamily}`;
          total += ctx.measureText(s.t).width;
        });
        let curX = -total / 2;
        segs.forEach(s => {
          ctx.font = `400 ${s.sup ? SUP : baseSize}px ${s.sup ? supFamily : fontFamily}`;
          ctx.fillStyle = color;
          ctx.fillText(s.t, curX, s.sup ? -(baseSize * 0.45) : 0);
          curX += ctx.measureText(s.t).width;
        });
        ctx.restore();
      }

      // Graph title — DM Serif Display
      if (titleHTML) {
        drawSegments(titleHTML, left + (right - left) / 2, top - 14, 0, 22, '#2c2825', "'DM Serif Display',serif");
      }

      drawSegments(xLabelHTML, left + (right - left) / 2, bottom + 40, 0, 14, '#4a4642');
      drawSegments(yLabelHTML, left - 40, top + (bottom - top) / 2, -Math.PI / 2, 14, '#4a4642');

      // Draw circles around anomalous points
      if (anomalyPts.length) {
        ctx.save();
        ctx.strokeStyle = '#f77e9d';
        ctx.lineWidth = 2;
        anomalyPts.forEach(pt => {
          const px = chart.scales.x.getPixelForValue(pt.x);
          const py = chart.scales.y.getPixelForValue(pt.y);
          ctx.beginPath();
          ctx.arc(px, py, 10, 0, Math.PI * 2);
          ctx.stroke();
        });
        ctx.restore();
      }
    }
  };

  if (chart) { chart.destroy(); chart = null; }
  if (!hasAny) return;


  chart = new Chart(document.getElementById('myChart').getContext('2d'), {
    type: 'scatter',
    data: {datasets},
    plugins: [whiteBgPlugin, errorBarPlugin, axisTitlePlugin],
    options: {
      responsive: true,
      maintainAspectRatio: false,
      animation: {duration: 200},
      layout: {padding: {bottom: 14, left: 40, top: 48}},
      plugins: {
        legend: {display: false},
        title: {display: false},
        subtitle: {display: false},
        tooltip: {
          backgroundColor: 'white', borderColor: '#e8e6e1', borderWidth: 1,
          titleColor: '#9a9189', bodyColor: '#2c2825',
          titleFont: {family: 'DM Sans', size: 10, weight: '500'},
          bodyFont: {family: 'DM Sans', size: 12, weight: '500'},
          padding: 10, cornerRadius: 8,
          callbacks: {
            label(ctx) {
              if (ctx.dataset.label !== 'Data') return `  ${ctx.parsed.y.toPrecision(4)}`;
              const eb = errBars[ctx.dataIndex];
              let s = `  (${ctx.parsed.x},  ${ctx.parsed.y})`;
              if (eb && errorsOn()) {
                if (eb.dx) s += `   \u00b1x: ${eb.dx}`;
                if (eb.dy) s += `   \u00b1y: ${eb.dy}`;
              }
              return s;
            }
          }
        }
      },
      scales: {
        x: {
          title: {display: false},
          grid: {color: '#f0ede9'},
          ticks: {color: '#4a4642', font: {family: 'DM Sans', size: 11}},
          border: {color: '#e8e6e1'},
          ...(cbExtra.checked ? {min: Math.min(0, ...normalPts.map(p => p.x))} : {}),
        },
        y: {
          title: {display: false},
          grid: {color: '#f0ede9'},
          ticks: {color: '#4a4642', font: {family: 'DM Sans', size: 11}},
          border: {color: '#e8e6e1'},
        }
      }
    }
  });
}

// ── Export image ───────────────────────────────────────────────────────
function exportImage() {
  if (!chart) return;
  const SCALE = window.devicePixelRatio * 3;
  const statsRow = document.getElementById('statsRow');
  const chartCard = document.getElementById('chartCard');

  // Capture stats pills and chart card separately, then composite
  const captureStats = statsRow
    ? html2canvas(statsRow, {backgroundColor: '#ffffff', scale: SCALE, useCORS: true, logging: false})
    : Promise.resolve(null);

  const captureChart = html2canvas(chartCard, {backgroundColor: '#ffffff', scale: SCALE, useCORS: true, logging: false});

  Promise.all([captureStats, captureChart]).then(([statsCanvas, chartCanvas]) => {
    const GAP = Math.round(12 * SCALE);
    const PAD = Math.round(20 * SCALE);
    const statsH = statsCanvas ? statsCanvas.height : 0;
    const totalH = (statsH ? statsH + GAP : 0) + chartCanvas.height + PAD * 2;
    const totalW = Math.max(chartCanvas.width, statsCanvas ? statsCanvas.width : 0) + PAD * 2;

    const off = document.createElement('canvas');
    off.width = totalW;
    off.height = totalH;
    const ctx = off.getContext('2d');

    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, totalW, totalH);

    let y = PAD;
    if (statsCanvas) {
      // Centre stats horizontally
      const sx = Math.round((totalW - statsCanvas.width) / 2);
      ctx.drawImage(statsCanvas, sx, y);
      y += statsCanvas.height + GAP;
    }
    ctx.drawImage(chartCanvas, PAD, y);

    const titleRaw = document.getElementById('graphTitle').value || 'graph';
    const a = document.createElement('a');
    a.href = off.toDataURL('image/png');
    a.download = titleRaw.replace(/[^\w\s-]/g, '').replace(/\s+/g, '_') + '.png';
    a.click();
  }).catch(() => {
    alert('Screenshot failed — please try again.');
  });
}


// ── Save / Load data ───────────────────────────────────────────────────
function getState() {
  return {
    graphTitle:    document.getElementById('graphTitle').value,
    xLabel:        document.getElementById('xLabel').value,
    xExp:          document.getElementById('xExp').value,
    xUnits:        document.getElementById('xUnits').value,
    yLabel:        document.getElementById('yLabel').value,
    yExp:          document.getElementById('yExp').value,
    yUnits:        document.getElementById('yUnits').value,
    trendType:     document.getElementById('trendType').value,
    showErrors:    document.getElementById('cbErrors').checked,
    extrapolate:   document.getElementById('cbExtrapolate').checked,
    showMaxGrad:   document.getElementById('cbMaxGrad').checked,
    xUncInput:     document.getElementById('xUncInput').value,
    yUncInput:     document.getElementById('yUncInput').value,
    rows: rows.map(r => ({
      x: r.x, y: r.y, dx: r.dx, dy: r.dy,
      dxAuto: r.dxAuto, dyAuto: r.dyAuto, anomalous: r.anomalous
    })),
  };
}

function setState(state) {
  const set = (id, v) => { const el = document.getElementById(id); if (el) el.value = v || ''; };
  const chk = (id, v) => { const el = document.getElementById(id); if (el) el.checked = !!v; };
  set('graphTitle', state.graphTitle);
  set('xLabel', state.xLabel); set('xExp', state.xExp); set('xUnits', state.xUnits);
  set('yLabel', state.yLabel); set('yExp', state.yExp); set('yUnits', state.yUnits);
  set('trendType', state.trendType);
  chk('cbErrors', state.showErrors);
  chk('cbExtrapolate', state.extrapolate);
  chk('cbMaxGrad', state.showMaxGrad);
  set('xUncInput', state.xUncInput);
  set('yUncInput', state.yUncInput);
  document.getElementById('uncPanel').classList.toggle('open', !!state.showErrors);
  rows = (state.rows || []).map(r => ({
    id: Date.now() + Math.random(),
    x: r.x, y: r.y, dx: r.dx, dy: r.dy,
    dxAuto: !!r.dxAuto, dyAuto: !!r.dyAuto, anomalous: !!r.anomalous
  }));
  renderRows();
  updateChart();
}

function saveData() {
  const state = getState();
  const title = state.graphTitle || 'data';
  const a = document.createElement('a');
  a.href = URL.createObjectURL(
    new Blob([JSON.stringify(state, null, 2)], {type: 'application/json'})
  );
  a.download = title.replace(/\s+/g, '_') + '.json';
  a.click();
  URL.revokeObjectURL(a.href);
}

function loadData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try { setState(JSON.parse(e.target.result)); }
    catch { alert('Could not read file — please check it is a valid Hooke Plotter data file.'); }
    event.target.value = '';
  };
  reader.readAsText(file);
}

// ── Startup ────────────────────────────────────────────────────────────
for (let i = 0; i < 5; i++) addRow();
</script>
